name: planzio-agent
version: 1.0.0
description: A project management agent that extracts tasks and manages projects.
runtime: nodejs
entrypoint: backend/src/index.js

tools:
  - name: extract_tasks
    description: Extracts tasks from document text using Gemini.
    service: aiService
  - name: manage_calendar
    description: Creates calendar events for tasks/meetings.
    service: calendarService
  - name: send_reminders
    description: Sends WhatsApp reminders via Twilio.
    service: whatsappService

environment:
  PORT: 8080
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
  TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
